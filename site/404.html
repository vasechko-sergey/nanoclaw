<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found — Sergei Vasechko</title>
<style>
  :root{
    --ground:#E9EDEE;--ink:#0C1618;--muted:#586669;--signal:#0A7E8B;--signal-soft:#54BCC5;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--ground);
    color:var(--ink);font-family:var(--sans);padding:2rem;text-align:center;-webkit-font-smoothing:antialiased}
  .wrap{display:grid;gap:1.4rem;justify-items:center;max-width:30rem}
  .orb{width:108px;height:108px;border-radius:50%;
    background:radial-gradient(circle,rgba(84,188,197,.92),rgba(10,126,139,.45) 46%,transparent 72%);
    animation:breathe 3.6s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(.9);opacity:.82}50%{transform:scale(1.06);opacity:1}}
  .code{font-family:var(--mono);font-size:.76rem;letter-spacing:.3em;color:var(--signal);text-transform:uppercase;margin:0}
  h1{font-family:var(--serif);font-weight:600;font-size:clamp(1.9rem,5vw,2.5rem);margin:0;letter-spacing:-.01em}
  p.msg{margin:0;color:var(--muted);max-width:26rem;line-height:1.6}
  a{font-family:var(--mono);font-size:.78rem;letter-spacing:.04em;color:var(--signal);text-decoration:none;
    border:1px solid var(--signal);border-radius:999px;padding:.55em 1.2em;transition:background .2s ease,color .2s ease}
  a:hover{background:var(--signal);color:var(--ground)}
  @media (prefers-reduced-motion:reduce){.orb{animation:none}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="orb"></div>
    <p class="code">Error 404</p>
    <h1>Page not found</h1>
    <p class="msg">That page doesn't exist — it may have moved, or never lived here.</p>
    <a href="/">← Back to vasechko.dev</a>
  </div>
</body>
</html>
