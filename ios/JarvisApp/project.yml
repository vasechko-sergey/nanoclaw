name: JarvisApp
options:
  bundleIdPrefix: com.vasechko
  deploymentTarget:
    iOS: "18.0"

settings:
  base:
    DEVELOPMENT_TEAM: 24Z6S27D7U
    SWIFT_EMIT_LOC_STRINGS: YES

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "6.29.0"

targets:
  JarvisApp:
    type: application
    platform: iOS
    sources:
      - path: Sources/JarvisApp
        excludes:
          - "JarvisRingView.swift"
      - path: Assets.xcassets
    dependencies:
      - package: GRDB
        product: GRDB
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UIBackgroundModes:
          - remote-notification
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.vasechko.jarvis.morning-health
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocationWhenInUseUsageDescription: "Геолокация передаётся агенту как контекст"
        NSHealthShareUsageDescription: "Данные активности и сна передаются агенту как контекст"
        NSHealthUpdateUsageDescription: "Данные активности передаются агенту как контекст"
        NSCameraUsageDescription: "Камера нужна, чтобы прикреплять снимки к сообщениям Jarvis"
        NSMicrophoneUsageDescription: "Микрофон нужен для голосового ввода сообщений Jarvis"
        NSSpeechRecognitionUsageDescription: "Распознавание речи превращает ваш голос в текст сообщения"
        NSCalendarsUsageDescription: "Ближайшее событие календаря передаётся агенту как контекст"
        NSCalendarsFullAccessUsageDescription: "Ближайшее событие календаря передаётся агенту как контекст"
        NSRemindersFullAccessUsageDescription: "Список незавершённых напоминаний передаётся агенту как контекст"
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: JarvisApp.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vasechko.jarvis
        PRODUCT_NAME: Jarvis
        INFOPLIST_KEY_CFBundleDisplayName: Jarvis
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 24Z6S27D7U
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        TARGETED_DEVICE_FAMILY: "1,2"

  JarvisUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Sources/JarvisUITests
    dependencies:
      - target: JarvisApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vasechko.jarvis.uitests
        TEST_TARGET_NAME: JarvisApp
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 24Z6S27D7U
        GENERATE_INFOPLIST_FILE: YES

  JarvisAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Sources/JarvisAppTests
    dependencies:
      - target: JarvisApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vasechko.jarvis.unittests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Jarvis.app/Jarvis"
        BUNDLE_LOADER: "$(TEST_HOST)"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 24Z6S27D7U
        GENERATE_INFOPLIST_FILE: YES

  JarvisWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Sources/JarvisWatch
    info:
      path: Sources/JarvisWatch/Info.plist
      properties:
        WKApplication: true
        WKWatchKitApp: false
        WKCompanionAppBundleIdentifier: com.vasechko.jarvis
        NSMicrophoneUsageDescription: "Микрофон для голосового ввода Jarvis"
        NSSpeechRecognitionUsageDescription: "Распознавание речи для голосового ввода Jarvis"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vasechko.jarvis.watch
        PRODUCT_NAME: JarvisWatch
        INFOPLIST_KEY_CFBundleDisplayName: Jarvis
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "4"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 24Z6S27D7U
        GENERATE_INFOPLIST_FILE: NO
